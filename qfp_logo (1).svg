<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="innershadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000" flood-opacity="0.4" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2D3D"/>
      <stop offset="100%" style="stop-color:#0D1F3C"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2FAD6A"/>
      <stop offset="100%" style="stop-color:#1A7A4A"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#C8D0DC"/>
      <stop offset="100%" style="stop-color:#8898AA"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0C84A"/>
      <stop offset="100%" style="stop-color:#D4A843"/>
    </linearGradient>
  </defs>

  <!-- Outer hex shape - silver border -->
  <polygon points="250,18 460,132 460,368 250,482 40,368 40,132"
    fill="url(#silverGrad)" filter="url(#shadow)"/>

  <!-- Inner hex shape - dark navy -->
  <polygon points="250,36 444,146 444,354 250,464 56,354 56,146"
    fill="url(#hexGrad)"/>

  <!-- Green accent ring inside hex -->
  <polygon points="250,48 432,154 432,346 250,452 68,346 68,154"
    fill="none" stroke="url(#greenGrad)" stroke-width="3"/>

  <!-- Blue horizontal speed lines (like QT training) -->
  <rect x="90" y="208" width="320" height="3" fill="#1A6ABA" opacity="0.6" rx="2"/>
  <rect x="90" y="216" width="320" height="2" fill="#1A6ABA" opacity="0.4" rx="2"/>
  <rect x="90" y="222" width="320" height="2" fill="#1A6ABA" opacity="0.3" rx="2"/>
  <rect x="90" y="228" width="320" height="1.5" fill="#1A6ABA" opacity="0.2" rx="2"/>

  <!-- Soccer ball circle -->
  <circle cx="250" cy="185" r="68" fill="url(#silverGrad)" filter="url(#shadow)"/>
  <circle cx="250" cy="185" r="62" fill="white"/>
  <circle cx="250" cy="185" r="62" fill="none" stroke="#1A7A4A" stroke-width="3"/>

  <!-- Soccer ball pentagon pattern -->
  <polygon points="250,138 263,155 257,175 243,175 237,155" fill="#1A2A3A"/>
  <polygon points="250,138 267,128 282,140 277,158 263,155" fill="#1A2A3A" opacity="0.7"/>
  <polygon points="250,138 233,128 218,140 223,158 237,155" fill="#1A2A3A" opacity="0.7"/>
  <polygon points="257,175 277,158 295,165 295,183 274,190" fill="#1A2A3A" opacity="0.5"/>
  <polygon points="243,175 223,158 205,165 205,183 226,190" fill="#1A2A3A" opacity="0.5"/>
  <polygon points="257,175 274,190 265,210 235,210 226,190 243,175" fill="#1A2A3A" opacity="0.4"/>

  <!-- Q letter left of ball -->
  <text x="148" y="200" font-family="Arial Black, sans-serif" font-size="62" font-weight="900"
    fill="url(#silverGrad)" text-anchor="middle" filter="url(#shadow)">Q</text>

  <!-- FP letters right of ball -->
  <text x="352" y="200" font-family="Arial Black, sans-serif" font-size="52" font-weight="900"
    fill="url(#silverGrad)" text-anchor="middle" filter="url(#shadow)">FP</text>

  <!-- Main banner shape -->
  <polygon points="75,268 90,252 410,252 425,268 410,308 90,308"
    fill="url(#hexGrad)" stroke="url(#silverGrad)" stroke-width="2"/>

  <!-- Main text: QFOOTBALL -->
  <text x="250" y="293" font-family="Arial Black, sans-serif" font-size="36" font-weight="900"
    fill="white" text-anchor="middle" letter-spacing="2">QFOOTBALL</text>

  <!-- Green ribbon below banner -->
  <rect x="88" y="312" width="324" height="30" fill="url(#greenGrad)" rx="2"/>
  <!-- Green ribbon text -->
  <text x="250" y="333" font-family="Arial Black, sans-serif" font-size="15" font-weight="900"
    fill="white" text-anchor="middle" letter-spacing="4">· PATHWAYS ·</text>

  <!-- Bottom arc text -->
  <path id="bottomArc" d="M 115,400 Q 250,460 385,400" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="url(#silverGrad)" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">ELITE U.S. SOCCER PLACEMENT</textPath>
  </text>

  <!-- EST left badge -->
  <rect x="68" y="295" width="44" height="22" fill="url(#hexGrad)" stroke="url(#silverGrad)" stroke-width="1" rx="2"/>
  <text x="90" y="311" font-family="Arial, sans-serif" font-size="10" font-weight="700"
    fill="url(#silverGrad)" text-anchor="middle" letter-spacing="1">EST</text>

  <!-- 2026 right badge -->
  <rect x="388" y="295" width="44" height="22" fill="url(#hexGrad)" stroke="url(#silverGrad)" stroke-width="1" rx="2"/>
  <text x="410" y="311" font-family="Arial, sans-serif" font-size="10" font-weight="700"
    fill="url(#silverGrad)" text-anchor="middle" letter-spacing="1">2026</text>

  <!-- Star decorations -->
  <text x="105" y="345" font-size="12" fill="url(#greenGrad)" text-anchor="middle">★</text>
  <text x="120" y="345" font-size="12" fill="url(#greenGrad)" text-anchor="middle">★</text>
  <text x="380" y="345" font-size="12" fill="url(#greenGrad)" text-anchor="middle">★</text>
  <text x="395" y="345" font-size="12" fill="url(#greenGrad)" text-anchor="middle">★</text>

  <!-- Small shield at bottom center -->
  <polygon points="250,358 262,365 262,378 250,385 238,378 238,365" fill="url(#greenGrad)" stroke="url(#silverGrad)" stroke-width="1"/>
  <text x="250" y="378" font-family="Arial, sans-serif" font-size="10" font-weight="900"
    fill="white" text-anchor="middle">Q</text>
</svg>
